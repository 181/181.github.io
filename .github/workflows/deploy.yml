name: Deploy Next.js Static Export

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5   # updated

      - name: Setup Node.js
        uses: actions/setup-node@v5  # updated
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Export static site
        run: npm run export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4   # updated
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out